name: 前端构建与部署

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'

env:
  NODE_VERSION: '18'

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: ESLint检查
        run: npm run lint --if-present || echo "无可用lint脚本，跳过"

      - name: 构建测试
        run: npm run build

  # ==================== 安全扫描 ====================
  security-scan:
    name: 安全漏洞扫描
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 依赖漏洞扫描
        run: npm audit --audit-level=high || true

      - name: Snyk安全扫描
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ==================== 单元测试 ====================
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 运行测试
        run: npm test --if-present || echo "无可用测试，跳过"

  # ==================== 构建打包 ====================
  build:
    name: 构建部署包
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30

  # ==================== 部署到服务器 ====================
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist-main
          path: dist/

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.FRONTEND_DEPLOY_PATH }}
            
            # 备份当前版本
            if [ -d "dist" ]; then
              tar -czf backup/dist_$(date +%Y%m%d_%H%M%S).tar.gz dist/
              rm -rf dist_old
              mv dist dist_old
            fi
            
            # 部署新版本
            mkdir -p dist
            cp -r ${{ github.workspace }}/dist/* dist/
            
            # 重启Nginx/服务
            ${{ secrets.DEPLOY_COMMAND || 'sudo systemctl reload nginx' }}
            
            echo "前端部署完成"

  # ==================== 开发环境自动部署 ====================
  deploy-dev:
    name: 部署到开发环境
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist-develop
          path: dist/

      - name: 部署到开发服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWORD }}
          port: ${{ secrets.DEV_SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.DEV_FRONTEND_DEPLOY_PATH }}
            mkdir -p dist
            cp -r ${{ github.workspace }}/dist/* dist/
            echo "开发环境前端部署完成"

  # ==================== 生成部署报告 ====================
  report:
    name: 部署报告
    runs-on: ubuntu-latest
    needs: [deploy, deploy-dev]
    if: always()
    steps:
      - name: 输出部署状态
        run: |
          echo "=== 部署状态报告 ==="
          echo "分支: ${{ github.ref_name }}"
          echo "提交: ${{ github.sha }}"
          echo "提交者: ${{ github.actor }}"
          echo "构建ID: ${{ github.run_id }}"
          echo "前端部署: ${{ needs.deploy.result }}"
          echo "开发环境: ${{ needs.deploy-dev.result }}"
