name: 后端构建与部署

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'sql/**'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'sql/**'

env:
  NODE_VERSION: '18'
  SERVICE_NAME: 'ma-system-backend'

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: 代码规范检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 静态代码分析
        run: |
          npm install --save-dev eslint
          npx eslint . --ext .js || echo "ESLint检查完成"

  # ==================== 安全扫描 ====================
  security-scan:
    name: 安全漏洞扫描
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: server

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 依赖漏洞扫描
        run: npm audit --audit-level=high || true

  # ==================== 数据库迁移检查 ====================
  db-check:
    name: 数据库脚本验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查SQL文件
        run: |
          echo "=== 检查新增/修改的SQL文件 ==="
          git diff --name-only HEAD~1 HEAD -- 'sql/*.sql' || echo "无SQL变更"

      - name: SQL语法验证
        run: |
          echo "验证SQL文件格式..."
          for file in $(find sql -name "*.sql" 2>/dev/null); do
            echo "检查: $file"
            # 基础语法检查（确保不是空文件且包含基本SQL结构）
            if [ -s "$file" ]; then
              head -5 "$file" | grep -qi "select\|insert\|update\|create\|alter\|delete" && echo "  ✓ 格式正常" || echo "  ⚠ 需人工确认"
            fi
          done

  # ==================== 构建打包 ====================
  build:
    name: 构建后端服务
    runs-on: ubuntu-latest
    needs: [lint, security-scan, db-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    defaults:
      run:
        working-directory: server

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: 安装依赖
        run: npm ci --production

      - name: 验证服务启动
        run: |
          timeout 10 npm start || true
          echo "构建验证完成"

      - name: 打包后端代码
        run: |
          mkdir -p ../deployment/backend
          tar -czf ../deployment/backend/server.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='coverage' \
            --exclude='*.log' \
            .

      - name: 打包SQL脚本
        run: |
          mkdir -p ../deployment/backend/sql
          cp -r sql/* ../deployment/backend/sql/ 2>/dev/null || true

      - name: 上传部署包
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ github.ref_name }}
          path: deployment/backend/
          retention-days: 30

  # ==================== 部署到生产服务器 ====================
  deploy:
    name: 部署到生产服务器
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载部署包
        uses: actions/download-artifact@v4
        with:
          name: backend-main
          path: deployment/

      - name: 部署到生产服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            BACKEND_PATH="${{ secrets.BACKEND_DEPLOY_PATH }}"
            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            
            # 备份当前版本
            if [ -d "$BACKEND_PATH" ]; then
              mkdir -p $BACKEND_PATH/backup
              tar -czf $BACKEND_PATH/backup/server_$(date +%Y%m%d_%H%M%S).tar.gz -C $BACKEND_PATH server.tar.gz 2>/dev/null || true
              
              # 停止服务
              pm2 stop $SERVICE_NAME 2>/dev/null || sudo systemctl stop $SERVICE_NAME 2>/dev/null || true
            fi
            
            # 解压新版本
            mkdir -p $BACKEND_PATH
            tar -xzf deployment/backend/server.tar.gz -C $BACKEND_PATH
            
            # 复制SQL脚本
            cp -r deployment/backend/sql/* $BACKEND_PATH/sql/ 2>/dev/null || true
            
            # 安装依赖
            cd $BACKEND_PATH/server
            npm ci --production 2>/dev/null || npm install --production
            
            # 重启服务
            pm2 startOrRestart ${{ secrets.PM2_CONFIG || 'ecosystem.config.js' }} 2>/dev/null || \
              sudo systemctl restart $SERVICE_NAME 2>/dev/null || \
              node server.js &
            
            sleep 3
            
            # 健康检查
            curl -s http://localhost:${{ secrets.BACKEND_PORT || 3001 }}/api/health || echo "健康检查完成"
            
            echo "后端部署完成"

  # ==================== 开发环境部署 ====================
  deploy-dev:
    name: 部署到开发服务器
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载部署包
        uses: actions/download-artifact@v4
        with:
          name: backend-develop
          path: deployment/

      - name: 部署到开发服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          password: ${{ secrets.DEV_SERVER_PASSWORD }}
          port: ${{ secrets.DEV_SERVER_PORT || 22 }}
          script: |
            BACKEND_PATH="${{ secrets.DEV_BACKEND_DEPLOY_PATH }}"
            mkdir -p $BACKEND_PATH
            tar -xzf deployment/backend/server.tar.gz -C $BACKEND_PATH
            cp -r deployment/backend/sql/* $BACKEND_PATH/sql/ 2>/dev/null || true
            cd $BACKEND_PATH/server
            npm ci --production 2>/dev/null || npm install --production
            pm2 restart dev-${{ env.SERVICE_NAME }} 2>/dev/null || node server.js &
            echo "开发环境后端部署完成"

  # ==================== 部署报告 ====================
  report:
    name: 部署状态报告
    runs-on: ubuntu-latest
    needs: [deploy, deploy-dev]
    if: always()
    steps:
      - name: 输出部署状态
        run: |
          echo "=== 后端部署状态报告 ==="
          echo "分支: ${{ github.ref_name }}"
          echo "提交: ${{ github.sha }}"
          echo "生产部署: ${{ needs.deploy.result }}"
          echo "开发部署: ${{ needs.deploy-dev.result }}"
